name: local_trivia
description: A synchronized real-time trivia contest app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.2.1
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  mobile_scanner: ^7.2.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/

